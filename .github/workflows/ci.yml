on: 
  push: 
    branches:
      - '**'

name: CI
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps: 
      - name: Check-out source code
        uses: actions/checkout@v2
    
      - name: Prepare GitHub release
        id: create_prod_release
        uses: fortify/3rdparty-actions/actions/googleapis/release-please-action/v5@main
        if: github.ref == 'refs/heads/main'
        with:
          release-type: simple
          skip-github-pull-request: true
          
      - name: Define build properties
        run: |
          echo DO_RELEASE=${{ steps.create_prod_release.outputs.release_created || false }} >> $GITHUB_ENV
          
      - name: Build
        run: ./gradlew build
          
      - name: Publish to Maven Central
        if: github.ref == 'refs/heads/main'
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository -PisReleaseVersion=${{ env.DO_RELEASE }}
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.OSSRH_GPG_SECRET_KEY_PWD }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.MAVEN_CENTRAL_USER }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          
      - name: Prepare release PR
        uses: fortify/3rdparty-actions/actions/googleapis/release-please-action/v5@main
        if: github.ref == 'refs/heads/main'
        with:
          release-type: simple
          skip-github-release: true
